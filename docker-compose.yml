services:
  postgres:
    image: postgres:16-alpine
    container_name: healthy-habits-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: healthy_habits
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d healthy_habits"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
